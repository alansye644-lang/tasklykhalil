<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="a2styl.css">
</head>
<script src="app.js"></script>
<body dir="rtl">
    <div class="container">
        <div class="auth-card">
            <h1>تسجيل الدخول </h1>
            <p>ادخل بياناتك للوصول الى قائمة المهام</p>

            <form class="form-group" id="loginForm">
                <div>
                    <label for="email">البريد الإلكتروني</label>
                </div>
                <input type="email" id="email" name="email" required>
                <div>
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary"> تسجيل الدخول</button>
            </form>
            <div class="auth-links">
                <p>ليس لديك حساب؟ <a href="singin.html">أنشئ حساباً جديداً</a></p>
                <p><a href="index.html">← العودة إلى الرئيسية</a></p>
            </div>
        </div>
    </div>
</body>

</html>
