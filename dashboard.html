<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="astyle.css">
</head>
<script src="app.js"></script>

<body>
    <div class="container">
        <header class="dashboard-header">
            <div class="user-info">
                <h1>قائمةالمهام</h1>
                <p>مرحباً،بك</p>
            </div>
            <div>
                <button id="logoutBtn" class="btn btn-secondary">تسجيل الخروج</button>
            </div>
        </header>
        <main class="dashboard-content">
            <div class="task-form-section">
                <h2>إضافة مهمة جديدة</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <input type="text" id="taskInput" placeholder="أدخل المهمة الجديدة..." required>
                    </div>
                    <button type="submit" class="btn btn-primary">إضافة المهمة</button>
                </form>
            </div>
            <div class="tasks-section">
                <h2>مهامي</h2>
                <div class="tasks-filter">
                    <button class="filter-btn active" data-filter="all">جميع المهام</button>
                    <button class="filter-btn" data-filter="active">المهام النشطة</button>
                    <button class="filter-btn" data-filter="completed">المهام المكتملة</button>
                </div>
                <div id="tasksList" class="tasks-list">
                </div> 

                <div class="tasks-stats">
                    <p>إجمالي المهام: <span id="totalTasks">0</span></p>
                    <p>المهام المكتملة: <span id="completedTasks">0</span></p>
                    <p>المهام المتبقية: <span id="remainingTasks">0</span></p>
                </div>
            </div>
        </main>
        <footer>
            <p>م . خليل الانسي - Taskly Webside</p>
        </footer>
    <div>

</body>

</html>
